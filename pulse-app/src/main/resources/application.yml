server:
  port: 8081

spring:
  mail:
    host: smtp.qq.com
    port: 465
    username: 280328539@qq.com        # 完整邮箱地址，比如 123456@qq.com
    password: yhdjlygixddicaga             # ★授权码，不是QQ登录密码！
    protocol: smtps
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true               # QQ 邮箱 465 端口走 SSL
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
  application:
    name: pulse-app
  profiles:
    active: dev
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123456
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pulse?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
        namespace: public

# Redisson 配置(顶级节点,和 spring 同级)
redisson:
  address: redis://localhost:6379
  password: redis123456
  database: 0


rocketmq:
  name-server: localhost:9876
  producer:
    group: pulse_producer_group
    send-message-timeout: 3000

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: AUTO
  mapper-locations: classpath*:mapper/**/*.xml

logging:
  level:
    com.duanruixin.pulse: DEBUG