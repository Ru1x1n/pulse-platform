services:
  mysql:
    image: mysql:8.0.32
    container_name: pulse-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: pulse
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --log_bin=mysql-bin
      - --binlog_format=ROW
      - --server_id=1
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d
    networks:
      - pulse-net

  redis:
    image: redis:7.2
    container_name: pulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123456 --appendonly yes
    volumes:
      - ./data/redis:/data
    networks:
      - pulse-net

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: pulse-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
      NACOS_AUTH_IDENTITY_KEY: pulse
      NACOS_AUTH_IDENTITY_VALUE: pulse
    volumes:
      - ./data/nacos/logs:/home/nacos/logs
    networks:
      - pulse-net

  rmqnamesrv:
    image: apache/rocketmq:5.3.2
    container_name: pulse-rmqnamesrv
    restart: unless-stopped
    ports:
      - "9876:9876"
    environment:
      - "JAVA_OPT_EXT=-server -Xms256m -Xmx256m -Xmn128m"
    command: sh mqnamesrv
    networks:
      - pulse-net

  rmqbroker:
    image: apache/rocketmq:5.3.2
    container_name: pulse-rmqbroker
    restart: unless-stopped
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    environment:
      - NAMESRV_ADDR=rmqnamesrv:9876
      - "JAVA_OPT_EXT=-server -Xms512m -Xmx512m -Xmn256m"
    volumes:
      - ./rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.2/conf/broker.conf
    depends_on:
      - rmqnamesrv
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.3.2/conf/broker.conf
    networks:
      - pulse-net

networks:
  pulse-net:
    driver: bridge